<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Taxi FAST Simulation</title>
  <link rel="stylesheet" href="style.css" />

  <script src="config.js"></script>
  <script src="https://apis.openapi.sk.com/tmap/jsv2?version=1&appKey=zDKuxKrvNq5CnzUDpGFUy3AidWG84exu9ufMwPyt">

  </script>
</head>

<body>
  <div id="container">
    <div id="map_div"></div>

    <div id="panel">
      <h2>Taxi FAST</h2>
      <button onclick="runSimulation()">추천 위치 계산</button>
      <button onclick="clearMap()">초기화</button>
      <button onclick="generateRoadPoints(10)">
  가좌동 도로 좌표 10개 추출
</button>
      <button onclick="generateValidTrainingDataset(10)">성공 데이터 10개 생성</button>
      <button onclick="generateTrainingDataset(500)">
  학습 데이터 500개 생성
</button>

      <button onclick="downloadTrainingCSV()">CSV 다운로드 </button>

      <pre id="result">결과가 여기에 표시됩니다.</pre>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
